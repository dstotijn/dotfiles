# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB"
set -s extended-keys on
set -g mouse on
bind -T copy-mode-vi WheelUpPane send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 1 scroll-down
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g automatic-rename off
set -g monitor-bell on
set -g visual-bell off

# --- Prefix ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- smart-splits.nvim (seamless Ctrl-hjkl across nvim/tmux) ---
set -g @plugin 'mrjones2014/smart-splits.nvim'

# --- Vim-style splits ---
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Vim-style pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Vim copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# --- Windows ---
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind -n M-H previous-window
bind -n M-L next-window
bind -n M-Tab next-window
bind -n M-S-Tab previous-window

# --- Clear scrollback (Cmd+K via Ghostty sends Shift-F12) ---
bind -n S-F12 if -F "#{@pane-is-vim}" "" "send-keys -R \; send-keys C-l \; run-shell 'sleep 0.1' \; clear-history"

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Status bar (Catppuccin Mocha) ---
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=#94e2d5]%H:%M #[fg=#cdd6f4]│ #[fg=#f9e2af]%d %b"
set -g status-right-length 40
setw -g window-status-format "#{?window_bell_flag,#[fg=#fab387]#[bg=#1e1e2e]#[fg=#1e1e2e]#[bg=#fab387]#[bold] #I #W #[fg=#fab387]#[bg=#1e1e2e],#[fg=#313244]#[bg=#1e1e2e]#[fg=#6c7086]#[bg=#313244] #I #[fg=#cdd6f4]#W #[fg=#313244]#[bg=#1e1e2e]}"
setw -g window-status-current-format "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#5d8abf,bg=#89b4fa,bold] #I #[fg=#1e3a5f]#W #[fg=#89b4fa,bg=#1e1e2e]"
setw -g window-status-separator "  "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#1e1e2e,fg=#f9e2af"
set -g status 2
set -g 'status-format[1]' '#[bg=#1e1e2e] '

# --- TPM (keep at bottom) ---
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
