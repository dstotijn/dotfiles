# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB"
set -s extended-keys on
set -g mouse on
bind -T copy-mode-vi WheelUpPane send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 1 scroll-down
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Prefix ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- smart-splits.nvim (seamless Ctrl-hjkl across nvim/tmux) ---
set -g @plugin 'mrjones2014/smart-splits.nvim'

# --- Vim-style splits ---
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Vim-style pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Vim copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# --- Windows ---
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind -n M-H previous-window
bind -n M-L next-window

# --- Clear scrollback (Cmd+K via Ghostty sends Shift-F12) ---
bind -n S-F12 if -F "#{@pane-is-vim}" "" "send-keys -R \; send-keys C-l \; run-shell 'sleep 0.1' \; clear-history"

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Status bar (Everblush) ---
set -g status-position top
set -g status-style "bg=#1e2528,fg=#dadada"
set -g status-left "#[fg=#67b0e8,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=#6cbfbf]%H:%M #[fg=#dadada]│ #[fg=#e5c76b]%d %b"
set -g status-right-length 40
setw -g window-status-format "#[fg=#6e6f72] #I:#W"
setw -g window-status-current-format "#[fg=#67b0e8,bold] #I:#W"
set -g pane-border-style "fg=#3b4b51"
set -g pane-active-border-style "fg=#67b0e8"
set -g message-style "bg=#1e2528,fg=#e5c76b"

# --- TPM (keep at bottom) ---
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
