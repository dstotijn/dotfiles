"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

add_newline = false

[line_break]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[package]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[ruby]
disabled = true

[php]
disabled = true

[lua]
disabled = true

[dart]
disabled = true

[swift]
disabled = true

[kotlin]
disabled = true

[zig]
disabled = true

[docker_context]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[battery]
disabled = true

[directory]
style = "bold teal"

[character]
success_symbol = "[\\$](overlay1)"
error_symbol = "[\\$](bold red)"

[git_branch]
symbol = "󰘬 "
style = "bold mauve"

[git_status]
style = "bold overlay2"
conflicted = "[✘](red)"
ahead = "[⇡](teal)"
behind = "[⇣](yellow)"
diverged = "[⇕](yellow)"
untracked = "[?](blue)"
stashed = "[\\$](teal)"
modified = "[!](peach)"
staged = "[+](green)"
deleted = "[✘](yellow)"
renamed = "[»](blue)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
